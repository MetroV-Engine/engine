name: Build with Ninja

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Only vcpkg is required for CMake; the `scripts` submodule may be private or absent on CI.
      - name: Init vcpkg submodule
        run: git submodule update --init --depth 1 vcpkg

      # Same CMake/Ninja on every OS (see https://github.com/lukka/get-cmake/releases).
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.1
        with:
          cmakeVersion: 3.31.6
          ninjaVersion: 1.12.1

      # vcpkg bootstrap scripts require zip/unzip on Debian-based images.
      - name: Install vcpkg bootstrap deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: cmake-build-debug
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Configure CMake
        run: cmake -B cmake-build-debug -G Ninja

      - name: Build with Ninja
        run: ninja -C cmake-build-debug
