name: Build with Ninja

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Only vcpkg is required for CMake; the `scripts` submodule may be private or absent on CI.
      - name: Init vcpkg submodule
        run: git submodule update --init --depth 1 vcpkg

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja -y

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: cmake-build-debug
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Configure CMake
        run: cmake -B cmake-build-debug -G Ninja

      - name: Build with Ninja
        run: ninja -C cmake-build-debug

